name: Scheduled Telegram Image Bot

on:
  schedule:
    - cron: '30 7 * * *'  # ⏰ به وقت UTC (مثلاً ۱۰:۳۰ صبح ایران)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: Generate & Send
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          PROMPT: ${{ vars.IMAGE_PROMPT || 'A cinematic mountain landscape at golden hour, photorealistic, 4k' }}
        run: python generate_and_send.py
